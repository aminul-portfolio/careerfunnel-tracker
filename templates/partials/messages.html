{% if messages %}
<div class="message-stack cf-shell-messages" aria-label="Notifications">
    {% for message in messages %}
        <div
            class="message message-{{ message.tags }} cf-shell-message{% if 'success' in message.tags %} cf-shell-message-success{% elif 'warning' in message.tags %} cf-shell-message-warning{% elif 'error' in message.tags %} cf-shell-message-error{% else %} cf-shell-message-info{% endif %}"
            {% if 'error' in message.tags or 'warning' in message.tags %}role="alert"{% else %}role="status"{% endif %}
        >
            <span class="cf-shell-message-content">{{ message }}</span>
        </div>
    {% endfor %}
</div>
{% endif %}
